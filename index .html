<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Introduction Page</title>

<style>
    * {
        margin: 0px;

    }

        border-radius:8px;
        background:#2a5298
    }
    button:hover
    {
    background: #1e3c72;
}

</head>

<div class="card">

    </div>

</div>

</html>
